<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合勝大佃 - 蝦皮環保包裹系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #E5E7EB; color: #1E293B; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .nav-onyx { background: linear-gradient(135deg, #18181B 0%, #27272A 100%); }
        .shopee-line { height: 3px; background: linear-gradient(90deg, #EE4D2D, #F97316); }
        .sticky-header { flex-shrink: 0; z-index: 50; }
        .scanner-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .scrollable-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .btn-onyx { background: #18181B; color: #F97316; border: 1px solid #3F3F46; transition: all 0.3s; }
        .btn-onyx:hover { background: #27272A; color: #FFFFFF; }
        .btn-shopee { background: #EE4D2D; color: #FFFFFF; transition: all 0.3s; }
        .btn-shopee:hover { background: #D8431F; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #reader { width: 100%; max-width: 360px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
        #reader-wrap { display: none; }
        .qr-canvas { cursor: zoom-in; width: 96px; height: 96px; }
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        #qr-modal canvas { background: white; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="qr-modal" onclick="this.style.display='none'">
        <p class="text-white mb-4 font-bold tracking-widest uppercase">Tap to close</p>
        <canvas id="modal-qr"></canvas>
        <p id="modal-qr-text" class="text-white mt-4 font-mono text-sm break-all max-w-[90%] text-center"></p>
    </div>

    <header class="sticky-header">
        <nav class="nav-onyx text-white">
            <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-1 h-8 bg-orange-500 rounded-full"></div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tighter italic leading-none">SHOPEE <span class="text-orange-500">CLOUD</span></h1>
                        <p class="text-[8px] text-zinc-500 tracking-[0.3em] font-medium uppercase mt-1">合勝大佃 | 環保包裹掃描系統</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg text-xs font-bold tracking-wider transition-all shadow-lg">← 切換萊爾富</a>
                    <div id="item-count" class="bg-zinc-800/50 border border-zinc-700 px-4 py-1 rounded-lg text-center">
                        <span class="text-[9px] text-zinc-500 font-bold block leading-none mb-1 uppercase text-right">Count</span>
                        <span class="text-xl font-mono text-orange-500 leading-none">0</span>
                    </div>
                </div>
            </div>
            <div class="shopee-line"></div>
        </nav>

        <div class="scanner-card">
            <div class="max-w-6xl mx-auto p-4 md:p-6">
                <div class="flex flex-col lg:flex-row gap-4 items-center">
                    <div class="flex-1 w-full relative">
                        <input type="text" id="qr-input" autofocus
                               class="w-full pl-6 pr-14 py-4 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-8 focus:ring-orange-500/5 focus:border-zinc-400 outline-none transition-all text-xl font-mono tracking-tighter shadow-inner placeholder:text-zinc-300"
                               placeholder="掃描 QR code 或手動輸入...">
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button onclick="toggleCamera()" id="cam-btn" class="btn-shopee px-6 py-4 rounded-xl font-bold flex-1 lg:flex-none shadow-lg">📷 相機掃描</button>
                        <button onclick="exportToPDF()" class="btn-onyx px-6 py-4 rounded-xl font-bold flex-1 lg:flex-none shadow-lg">匯出 PDF</button>
                        <button onclick="clearAll()" class="bg-white border border-zinc-200 text-zinc-400 hover:text-red-500 px-4 py-4 rounded-xl transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
                <div id="reader-wrap" class="mt-4">
                    <div id="reader"></div>
                    <p class="text-center text-[10px] text-zinc-400 mt-2 tracking-widest uppercase">將 QR code 對準鏡頭</p>
                </div>
                <div id="status-msg" class="mt-3 flex items-center space-x-3">
                    <span id="status-dot" class="w-2.5 h-2.5 bg-zinc-300 rounded-full"></span>
                    <p id="status-text" class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">System Ready</p>
                </div>
            </div>
        </div>
    </header>

    <main class="scrollable-content p-4 md:p-6">
        <div class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-xl border border-white overflow-hidden">
            <table id="scan-table" class="w-full border-collapse">
                <thead class="bg-zinc-50 sticky top-0 z-10 border-b border-zinc-100">
                    <tr class="text-zinc-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="py-4 px-4 font-bold w-20 text-center border-r">No.</th>
                        <th class="py-4 px-4 font-bold text-left">訂單號</th>
                        <th class="py-4 px-4 font-bold text-left">SPTO 單號</th>
                        <th class="py-4 px-4 font-bold text-center w-32">掃描 QR（點可放大）</th>
                        <th class="py-4 px-4 font-bold text-right">Time Log</th>
                        <th class="py-4 px-4 font-bold text-center w-16 no-print"></th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-zinc-50"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://cyzjgvdhthrzkfciaqcl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GErSlEWWvuOdUU0AN_r3yQ_OjTAyHwZ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scannedItems = [];
        let html5Qr = null;
        let camOn = false;
        let lastCamCode = null, lastCamTime = 0;

        const inputEl = document.getElementById('qr-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const tableBody = document.getElementById('table-body');
        const countValue = document.querySelector('#item-count span:last-child');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(t){
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(t==='success'){o.type='sine';o.frequency.setValueAtTime(880,audioCtx.currentTime);g.gain.setValueAtTime(0.05,audioCtx.currentTime);o.start();g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);o.stop(audioCtx.currentTime+0.15)}else{o.type='sawtooth';o.frequency.setValueAtTime(150,audioCtx.currentTime);g.gain.setValueAtTime(0.1,audioCtx.currentTime);o.start();g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}
        }

        // 解析 QR 內容，例如 2_2149736_SPTO20260625LWBLF
        function parseQR(raw) {
            const parts = raw.split('_');
            if (parts.length >= 3) {
                return { orderNo: parts[1], spto: parts.slice(2).join('_') };
            }
            return { orderNo: '', spto: '' };
        }

        window.onload = async () => {
            await refreshData();
            inputEl.focus();
            _supabase.channel('shopee-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'shopee_scans' }, refreshData).subscribe();
        };

        async function refreshData() {
            const { data, error } = await _supabase.from('shopee_scans').select('*').order('id', { ascending: true });
            if (!error) { scannedItems = data; renderTable(); }
        }

        // 點畫面時聚焦輸入框（相機開啟時不搶焦點，避免干擾）
        document.addEventListener('click', (e) => { if (!camOn && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'CANVAS') inputEl.focus(); });

        inputEl.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const v = inputEl.value.trim();
                if (v) await processQR(v);
                inputEl.value = '';
            }
        });

        async function processQR(code) {
            // 防重複
            if (scannedItems.some(i => i.qr === code)) {
                playSound('error');
                setStatus("重複：此包裹已掃描過", 'red');
                return;
            }
            playSound('success');
            const { orderNo, spto } = parseQR(code);
            const now = new Date();
            const ts = `${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}, ${now.toLocaleTimeString('en-GB')}`;
            const { error } = await _supabase.from('shopee_scans').insert([{ qr: code, order_no: orderNo, spto: spto, time: ts }]);
            if (error) { playSound('error'); setStatus("寫入失敗：" + error.message, 'red'); return; }
            setStatus(`已記錄 ${orderNo || code}`, 'green');
        }

        function setStatus(msg, color) {
            statusText.innerText = msg;
            const map = { red:'bg-red-500', green:'bg-emerald-500', blue:'bg-blue-500', gray:'bg-zinc-300' };
            statusDot.className = `w-2.5 h-2.5 ${map[color]||map.gray} rounded-full`;
        }

        // ---------- 相機掃描 ----------
        function onCamScan(decodedText) {
            const now = Date.now();
            if (decodedText === lastCamCode && now - lastCamTime < 3000) return; // 同碼 3 秒內不重複觸發
            lastCamCode = decodedText; lastCamTime = now;
            processQR(decodedText.trim());
        }

        async function toggleCamera() {
            const wrap = document.getElementById('reader-wrap');
            const btn = document.getElementById('cam-btn');
            if (camOn) {
                if (html5Qr) { try { await html5Qr.stop(); } catch(e){} }
                wrap.style.display = 'none';
                btn.innerText = '📷 相機掃描';
                camOn = false;
                inputEl.focus();
                return;
            }
            wrap.style.display = 'block';
            btn.innerText = '⏹ 關閉相機';
            camOn = true;
            if (!html5Qr) html5Qr = new Html5Qrcode("reader");
            try {
                await html5Qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onCamScan);
            } catch (err) {
                setStatus("相機啟動失敗：" + err, 'red');
                wrap.style.display = 'none';
                btn.innerText = '📷 相機掃描';
                camOn = false;
            }
        }

        // ---------- 放大 QR ----------
        function zoomQR(text) {
            const modal = document.getElementById('qr-modal');
            modal.style.display = 'flex';
            document.getElementById('modal-qr-text').innerText = text;
            QRCode.toCanvas(document.getElementById('modal-qr'), text, { width: 300, margin: 2 });
        }

        // ---------- 表格 ----------
        function renderTable() {
            tableBody.innerHTML = '';
            [...scannedItems].reverse().forEach((item, index) => {
                const num = scannedItems.length - index;
                const row = `
                    <tr class="hover:bg-zinc-50 transition-colors">
                        <td class="p-5 text-center font-bold text-zinc-200 text-3xl border-r">${num}</td>
                        <td class="p-5 font-mono font-bold text-lg text-orange-600">${item.order_no || '-'}</td>
                        <td class="p-5 font-mono text-sm text-zinc-700">${item.spto || '-'}</td>
                        <td class="p-2 text-center"><canvas id="qr-${item.id}" class="qr-canvas inline-block"></canvas></td>
                        <td class="p-5 text-right font-mono text-[9px] text-zinc-400">${item.time}</td>
                        <td class="p-5 text-center no-print">
                            <button onclick="deleteItem(${item.id})" class="text-zinc-200 hover:text-red-500 transition-all transform hover:scale-110">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </td>
                    </tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
                const cv = document.getElementById(`qr-${item.id}`);
                QRCode.toCanvas(cv, item.qr, { width: 96, margin: 1 });
                cv.onclick = () => zoomQR(item.qr);
            });
            countValue.innerText = scannedItems.length;
        }

        async function deleteItem(id) { if(confirm('刪除這筆紀錄？')) await _supabase.from('shopee_scans').delete().eq('id', id); }
        async function clearAll() { if(confirm('清空全部紀錄？')) await _supabase.from('shopee_scans').delete().neq('id', 0); }

        // ---------- 匯出 PDF（重新排版成乾淨列印格式，含掃描用 QR）----------
        async function exportToPDF() {
            if (scannedItems.length === 0) return;
            const now = new Date();
            const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

            // 建立離屏列印容器
            const wrap = document.createElement('div');
            wrap.style.cssText = 'position:fixed;left:-99999px;top:0;width:800px;background:#fff;padding:24px;font-family:Inter,sans-serif;';
            let rows = '';
            scannedItems.forEach((item, i) => {
                rows += `
                    <tr>
                        <td style="border:1px solid #eee;padding:14px;text-align:center;font-size:24px;color:#ccc;">${i+1}</td>
                        <td style="border:1px solid #eee;padding:14px;font-weight:bold;font-size:18px;color:#EE4D2D;">${item.order_no || '-'}</td>
                        <td style="border:1px solid #eee;padding:14px;font-size:12px;color:#555;">${item.spto || '-'}</td>
                        <td style="border:1px solid #eee;padding:8px;text-align:center;"><canvas id="pdfqr-${i}"></canvas></td>
                        <td style="border:1px solid #eee;padding:14px;text-align:right;font-size:10px;color:#999;">${item.time}</td>
                    </tr>`;
            });
            wrap.innerHTML = `
                <h2 style="font-size:20px;font-weight:700;margin:0 0 16px;">合勝大佃｜蝦皮環保包裹　${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}　共 ${scannedItems.length} 筆</h2>
                <table style="width:100%;border-collapse:collapse;">
                    <thead><tr style="background:#FAFAFA;color:#888;font-size:11px;">
                        <th style="border:1px solid #eee;padding:10px;">No.</th>
                        <th style="border:1px solid #eee;padding:10px;text-align:left;">訂單號</th>
                        <th style="border:1px solid #eee;padding:10px;text-align:left;">SPTO 單號</th>
                        <th style="border:1px solid #eee;padding:10px;">掃描 QR</th>
                        <th style="border:1px solid #eee;padding:10px;text-align:right;">時間</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
            document.body.appendChild(wrap);

            // 等所有 QR 畫好
            await Promise.all(scannedItems.map((item, i) => new Promise(res => {
                QRCode.toCanvas(document.getElementById(`pdfqr-${i}`), item.qr, { width: 110, margin: 1 }, () => res());
            })));

            const canvas = await html2canvas(wrap, { scale: 2, useCORS: true });
            document.body.removeChild(wrap);

            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
            const ih = (canvas.height * pw) / canvas.width;
            let hl = ih, pos = 0;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, pos, pw, ih);
            hl -= ph;
            while (hl > 0) { pos = hl - ih; pdf.addPage(); pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, pos, pw, ih); hl -= ph; }
            pdf.save(`${dateStr} 合勝大佃II蝦皮環保包裹 ${scannedItems.length}.pdf`);
        }
    </script>
</body>
</html>
